<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Plate ring -->
  <circle cx="256" cy="248" r="132" fill="none" stroke="#ffffff" stroke-width="14" opacity="0.95"/>
  <circle cx="256" cy="248" r="104" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.45"/>
  <!-- Fork -->
  <g fill="#ffffff">
    <rect x="150" y="150" width="11" height="58" rx="5"/>
    <rect x="170" y="150" width="11" height="58" rx="5"/>
    <rect x="190" y="150" width="11" height="58" rx="5"/>
    <rect x="170" y="200" width="11" height="170" rx="5"/>
    <path d="M150 196 q25 22 51 0 v14 q-25 20 -51 0 z"/>
  </g>
  <!-- Spoon / supplement capsule -->
  <g>
    <rect x="320" y="150" width="42" height="80" rx="21" fill="#ffffff"/>
    <rect x="320" y="190" width="42" height="40" rx="0" fill="#34d399"/>
    <rect x="320" y="190" width="42" height="40" rx="0" fill="#34d399" opacity="0.9"/>
    <path d="M320 211 v0 a21 21 0 0 0 42 0 v-21 h-42 z" fill="#34d399"/>
    <rect x="336" y="230" width="11" height="140" rx="5" fill="#ffffff"/>
  </g>
  <!-- Pulse line across plate -->
  <path d="M186 256 h26 l14 -30 l20 60 l16 -38 l12 8 h40"
        fill="none" stroke="#34d399" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
